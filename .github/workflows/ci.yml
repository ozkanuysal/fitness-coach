name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          AUTH_SECRET: ci-test-secret-not-real
          AUTH_URL: http://localhost:3000

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg MONGODB_URI=mongodb://localhost:27017/test \
            --build-arg AUTH_SECRET=ci-test-secret \
            --build-arg AUTH_URL=http://localhost:3000 \
            -t fitness-coach:test .
